name: Generate API Docs and PR to genlayer-docs

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  generate-and-sync:
    if: github.event_name != 'release' || !contains(github.event.release.tag_name, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pdoc

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')" >> $GITHUB_OUTPUT
          fi

      - name: Generate API docs
        run: python scripts/generate-api-docs.py

      - name: Generate docs repo token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DOCS_SYNC_APP_ID }}
          private-key: ${{ secrets.DOCS_SYNC_APP_KEY }}
          repositories: genlayer-docs

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: genlayerlabs/genlayer-docs
          token: ${{ steps.app-token.outputs.token }}
          path: docs-repo
          fetch-depth: 0

      - name: Prepare branch
        working-directory: docs-repo
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="docs/py/${{ github.ref_name }}-${{ github.run_id }}"
          git switch -c "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Sync docs into docs repo
        run: |
          set -euo pipefail
          mkdir -p docs-repo/pages/api-references/genlayer-py
          cp docs/api-references/genlayer-py.md docs-repo/pages/api-references/genlayer-py/index.md

      - name: Commit, push, and create PR
        working-directory: docs-repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git add pages/api-references/genlayer-py
          git commit -m "docs(py): sync API reference ${{ steps.version.outputs.value }}"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --repo genlayerlabs/genlayer-docs \
            --base main \
            --head "$BRANCH" \
            --title "docs(py): sync PY SDK API reference ${{ steps.version.outputs.value }}" \
            --body "Auto-generated API reference update from genlayer-py.

          - Version: \`${{ steps.version.outputs.value }}\`
          - Source commit: \`${{ github.sha }}\`"
