name: Smoke Tests

on:
  pull_request:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: Testnet Smoke Tests
    runs-on: ubuntu-latest
    # Bradbury/Asimov RPC reads occasionally stall for 2-3 minutes on
    # single calls (testnet capacity); with 17 testnet-flagged tests
    # even one hiccup blew past the old 5-minute ceiling. 15m gives
    # enough slack for two slow calls without indefinite hangs.
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run smoke tests
        run: uv run pytest tests/unit/smoke -v -m testnet
